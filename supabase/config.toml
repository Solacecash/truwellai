# Supabase project config
# https://supabase.com/docs/guides/cli/config

[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
port = 54323

[inbucket]
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[functions.ai-health-assistant]
# Gateway JWT verification is DISABLED because this project issues user session
# JWTs with ES256 (asymmetric) signing, which the Edge Functions gateway JWT
# verifier does not support — the gateway rejects every logged-in user request
# with UNAUTHORIZED_UNSUPPORTED_TOKEN_ALGORITHM before the function code runs.
# The function itself still receives the user's JWT via the Authorization
# header and uses the service role client for DB operations.
verify_jwt = false

# NOTE on verify_jwt: this Supabase project signs user session JWTs with ES256
# (asymmetric keys), which the Edge Functions gateway JWT verifier does NOT
# support. Leaving verify_jwt = true causes every logged-in call to fail with
# UNAUTHORIZED_UNSUPPORTED_TOKEN_ALGORITHM. All user-facing functions below
# therefore disable gateway JWT verification; each function is responsible for
# its own auth (it still receives the Authorization header and uses the
# service role client internally).

[functions.tts-synthesize]
verify_jwt = false

[functions.stt-transcribe]
verify_jwt = false

[functions.scan-ingredient-analysis]
verify_jwt = false

[functions.confirm-telehealth-checkout]
verify_jwt = false

[functions.award-guardian-points]
verify_jwt = false

[functions.send-notification]
verify_jwt = false

[functions.nim-tts-synthesize]
verify_jwt = false

[functions.nim-tts-health]
verify_jwt = false
